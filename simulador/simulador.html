<section class="sim-hero">
  <div class="sim-hero-contenido">
    <h1>Simulador de Taza</h1>
    <p>Subí tu diseño, agregá texto y mirá una vista previa antes de pedirla</p>

    <a
      href="https://wa.me/5491160584396?text=Hola%20Subnaro,%20quiero%20hacer%20una%20taza%20personalizada"
      target="_blank"
      rel="noopener noreferrer"
      class="btn-sim-wsp"
    >
      Pedir por WhatsApp
    </a>
  </div>
</section>

<main class="sim-contenedor">
  <section class="panel-controles">
    <h2>Personalizá tu diseño</h2>

    <div class="grupo-control">
      <label for="imagenInput">Subir imagen</label>
      <input type="file" id="imagenInput" accept="image/*" />
    </div>

    <div class="grupo-control">
      <label for="textoInput">Texto opcional</label>
      <input
        type="text"
        id="textoInput"
        placeholder="Ej: Virgo, Planetas, Anime..."
        maxlength="30"
      />
    </div>

    <div class="grupo-control">
      <label for="tamanoInput">Tamaño del diseño</label>
      <input type="range" id="tamanoInput" min="80" max="220" value="140" />
    </div>

    <div class="grupo-control">
      <label for="textoTamanoInput">Tamaño del texto</label>
      <input type="range" id="textoTamanoInput" min="14" max="36" value="22" />
    </div>

    <div class="grupo-control">
      <label for="colorTextoInput">Color del texto</label>
      <input type="color" id="colorTextoInput" value="#111111" />
    </div>

    <div class="grupo-control">
      <label for="tipografiaInput">Tipo de letra</label>
      <select id="tipografiaInput">
        <option value="Arial, sans-serif">Arial</option>
        <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
        <option value="'Verdana', sans-serif">Verdana</option>
        <option value="'Georgia', serif">Georgia</option>
        <option value="'Times New Roman', serif">Times New Roman</option>
        <option value="'Courier New', monospace">Courier New</option>
        <option value="'Impact', sans-serif">Impact</option>
      </select>
    </div>

    <div class="grupo-botones">
      <button id="centrarBtn" type="button">Centrar diseño</button>
      <button id="limpiarBtn" type="button" class="btn-secundario">Limpiar</button>
    </div>

    <div class="sim-accion-extra">
      <a href="#" id="btnEnviarPedido" class="btn-sim-pedido">
        Quiero encargar esta idea
      </a>
    </div>
  </section>

  <section class="panel-preview">
    <h2>Vista previa</h2>

    <div class="escena-preview">
      <div class="taza">
        <img
          src="img/taza-base.png"
          alt="Taza base"
          class="taza-base"
        />

        <img
          id="previewDiseno"
          class="preview-diseno oculto"
          alt="Diseño del usuario"
        />

        <div id="previewTexto" class="preview-texto"></div>
      </div>
    </div>

    <p class="nota-preview">
      Esta vista es ilustrativa. El resultado final puede variar levemente.
    </p>
  </section>
</main>
